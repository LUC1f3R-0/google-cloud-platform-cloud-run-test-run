services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user_one
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: test_db01
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user_one -d test_db01']
      interval: 3s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '8000:8000'
    environment:
      PORT: '8000'
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: '5432'
      DB_USER: user_one
      DB_PASS: devpass
      DB_NAME: test_db01
      X_API_KEY: dev-api-key
    depends_on:
      db:
        condition: service_healthy
